<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Welcome</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">
<div class="phone">

  <!-- App header — back exits to VPay, POLARIS brand, no notification bell -->
  <div class="app-header">
    <a href="../../index.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="app-brand">
      <div class="app-logo">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>
      </div>
      <span class="app-name">POLARIS</span>
    </div>
    <div style="width:36px"></div>
  </div>

  <!-- POLARIS Logo -->
  <div class="fade-in" style="display:flex; justify-content:center; padding:32px 0 12px 0">
    <div style="width:80px; height:80px; border-radius:var(--r16); background:linear-gradient(135deg, var(--green), #2ED8A3); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,184,148,0.25)">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>
    </div>
  </div>

  <!-- Title & Tagline -->
  <h2 class="fade-in" style="text-align:center; font-size:20px; font-weight:700; color:var(--text); padding:0 var(--pad); margin-bottom:6px; animation-delay:0.05s">
    Invest in Real Estate with POLARIS
  </h2>
  <p class="fade-in" style="text-align:center; font-size:13px; color:var(--text-2); padding:0 var(--pad); margin-bottom:24px; animation-delay:0.1s">
    Tokenized real estate investment powered by VPay
  </p>

  <!-- VPay Account Card -->
  <div class="section fade-in" style="animation-delay:0.15s">
    <div class="card card-pad">
      <div class="card-body">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px">
          <div style="width:48px; height:48px; background:linear-gradient(135deg, #EFF6FF, #DBEAFE); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div style="flex:1">
            <p id="userName" style="font-size:15px; font-weight:700; color:var(--text)"></p>
            <p id="userPhone" style="font-size:13px; color:var(--text-2)"></p>
          </div>
          <span class="badge badge-success">VPay Verified</span>
        </div>

        <!-- Account info row -->
        <div class="info-row">
          <span class="info-label">Phone</span>
          <span class="info-value" id="userPhoneRow"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Continue Button -->
  <div class="section fade-in" style="margin-top:20px; animation-delay:0.2s">
    <a href="kyc-gate.html" class="btn-primary proto-link">
      Continue to POLARIS
    </a>
  </div>

  <!-- Info Note -->
  <div class="fade-in" style="margin:16px var(--pad) 0 var(--pad); background:var(--green-light); border:1px solid rgba(0,184,148,0.2); border-radius:var(--r12); padding:14px; animation-delay:0.25s">
    <div style="display:flex; align-items:flex-start; gap:10px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" style="flex-shrink:0; margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <p style="font-size:12px; color:var(--green-dark); line-height:1.5">
        Your VPay account will be used to access POLARIS. No separate registration required.
      </p>
    </div>
  </div>

  <div class="bottom-space"></div>
</div>

<script>
  // Display VPay user info from INVESTORS[0]
  const investor = INVESTORS[0];
  document.getElementById('userName').textContent = investor.name;
  document.getElementById('userPhone').textContent = investor.phone;
  document.getElementById('userPhoneRow').textContent = investor.phone;
</script>

</body>
</html>
