<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Submit Support Request</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="../oset/portfolio.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Submit Support Request</span>
  </div>

  <!-- Form card -->
  <div class="section fade-in">
    <div class="card" style="margin:0">
      <div class="card-body">

        <!-- Category selector -->
        <div style="margin-bottom:20px">
          <label class="input-label">Category</label>
          <div style="display:flex; flex-wrap:wrap; gap:8px">
            <button class="cat-btn active" onclick="selectCategory(this)">Account</button>
            <button class="cat-btn" onclick="selectCategory(this)">Transaction</button>
            <button class="cat-btn" onclick="selectCategory(this)">KYC</button>
            <button class="cat-btn" onclick="selectCategory(this)">Technical</button>
            <button class="cat-btn" onclick="selectCategory(this)">Other</button>
          </div>
        </div>

        <!-- Subject -->
        <div style="margin-bottom:20px">
          <label class="input-label">Subject</label>
          <input type="text" class="input" placeholder="Enter subject...">
        </div>

        <!-- Description -->
        <div style="margin-bottom:20px">
          <label class="input-label">Describe your issue</label>
          <textarea class="input" rows="4" placeholder="Describe your issue in detail..." style="resize:vertical; min-height:100px; font-family:inherit"></textarea>
        </div>

        <!-- Photo upload -->
        <div style="margin-bottom:20px">
          <label class="input-label">Attachments</label>
          <div style="border:2px dashed #D1D5DB; border-radius:var(--r12); padding:32px 16px; text-align:center; cursor:pointer" onclick="alert('This is a prototype -- upload function is not available')">
            <div style="color:var(--text-3); margin-bottom:8px">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
            <p style="font-size:13px; color:var(--text-2)">Add images (optional)</p>
            <p style="font-size:11px; color:var(--text-3); margin-top:4px">JPG, PNG -- Max 5MB</p>
          </div>
        </div>

        <!-- Contact preference -->
        <div style="margin-bottom:20px">
          <label class="input-label">Preferred contact method</label>
          <div style="display:flex; gap:12px">
            <label style="flex:1; display:flex; align-items:center; gap:10px; padding:12px 16px; border:1.5px solid var(--green); border-radius:var(--r12); cursor:pointer; background:#ECFDF5">
              <div style="width:18px; height:18px; border-radius:50%; border:2px solid var(--green); display:flex; align-items:center; justify-content:center">
                <div style="width:10px; height:10px; border-radius:50%; background:var(--green)"></div>
              </div>
              <span style="font-size:14px; color:var(--text); font-weight:500">Email</span>
            </label>
            <label style="flex:1; display:flex; align-items:center; gap:10px; padding:12px 16px; border:1.5px solid #E5E7EB; border-radius:var(--r12); cursor:pointer">
              <div style="width:18px; height:18px; border-radius:50%; border:2px solid #D1D5DB; display:flex; align-items:center; justify-content:center">
              </div>
              <span style="font-size:14px; color:var(--text); font-weight:500">Phone</span>
            </label>
          </div>
        </div>

        <!-- Submit -->
        <a href="ticket-status.html" class="btn-primary proto-link" style="text-align:center">Submit Request</a>

      </div>
    </div>
  </div>

  <!-- FAQ quick links -->
  <div class="section fade-in" style="animation-delay:0.05s">
    <div class="section-head">
      <span class="section-title">FAQ</span>
    </div>
    <div class="card" style="margin:0">
      <div class="card-body" style="padding:0">
        <div style="padding:14px 20px; border-bottom:1px solid #F0F0F0; display:flex; align-items:center; justify-content:space-between; cursor:pointer">
          <span style="font-size:14px; color:var(--text)">How to deposit funds?</span>
          <span style="color:var(--text-3)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
        <div style="padding:14px 20px; border-bottom:1px solid #F0F0F0; display:flex; align-items:center; justify-content:space-between; cursor:pointer">
          <span style="font-size:14px; color:var(--text)">Why was my transaction declined?</span>
          <span style="color:var(--text-3)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
        <div style="padding:14px 20px; border-bottom:1px solid #F0F0F0; display:flex; align-items:center; justify-content:space-between; cursor:pointer">
          <span style="font-size:14px; color:var(--text)">How to update KYC?</span>
          <span style="color:var(--text-3)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
        <div style="padding:14px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer">
          <span style="font-size:14px; color:var(--green); font-weight:600">User Guide</span>
          <span style="color:var(--green)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  function selectCategory(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

<style>
  .cat-btn {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid #E5E7EB;
    background: var(--white);
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .cat-btn.active {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
    font-weight: 600;
  }
</style>

</body>
</html>
