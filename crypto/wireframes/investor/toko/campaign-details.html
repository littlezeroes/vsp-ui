<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Campaign Details</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="campaign-list.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Campaign Details</span>
  </div>

  <!-- Hero Banner -->
  <div class="fade-in" id="heroBanner" style="height:160px; display:flex; align-items:flex-end; padding:16px var(--pad); position:relative">
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,0.9); font-weight:500">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="heroLocation"></span>
    </div>
    <div id="statusBadge" style="position:absolute; top:12px; right:var(--pad)"></div>
  </div>

  <!-- Project Info Card (overlapping hero) -->
  <div class="card card-pad fade-in" style="margin-top:-24px; position:relative; z-index:10; animation-delay:0.05s">
    <div class="card-body">
      <div style="font-size:17px; font-weight:700; color:var(--text); line-height:1.35" id="campaignName"></div>
      <div style="display:flex; align-items:center; gap:6px; margin-top:8px; font-size:13px; color:var(--text-2)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>
        <span id="projectName"></span>
        <span style="margin-left:4px; font-weight:600; color:var(--text-3)" id="tokenSymbol"></span>
      </div>
    </div>
  </div>

  <!-- Key Metrics (2x2 grid) -->
  <div class="fade-in" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px var(--pad) 0; animation-delay:0.1s">
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Token Price</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="tokenPrice"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Min Investment</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="minInvestment"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">End Date</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="endDate"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Committed Investors</div>
        <div style="font-size:15px; font-weight:700; color:var(--green)" id="commitmentCount"></div>
      </div>
    </div>
  </div>

  <!-- Funding Progress Card -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.15s">
    <div class="card-body">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <span style="font-size:14px; font-weight:600; color:var(--text)">Funding Progress</span>
        <span style="font-size:14px; font-weight:700; color:var(--green)" id="progressPercent"></span>
      </div>
      <div class="prog-track" style="height:8px">
        <div class="prog-fill" id="progressBar" style="height:100%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:var(--text-2)">
        <span id="raisedAmount"></span>
        <span id="targetAmount"></span>
      </div>
    </div>
  </div>

  <!-- Campaign Info Card -->
  <div class="section fade-in" style="animation-delay:0.2s">
    <div class="card card-pad">
      <div class="card-body">
        <div style="font-size:15px; font-weight:700; color:var(--text); margin-bottom:12px">Campaign Information</div>
        <div class="info-row">
          <span class="info-label">Whitelist Count</span>
          <span class="info-value" id="whitelistCount"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Campaign Duration</span>
          <span class="info-value" id="campaignDuration"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Investment Range</span>
          <span class="info-value" id="investmentRange"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <div class="fade-in" style="padding:24px var(--pad) 0; animation-delay:0.25s" id="ctaContainer"></div>

  <div class="bottom-space"></div>

</div>

<script>
  // Read campaign via ?id= URL param, fallback to first OPEN campaign
  const params = new URLSearchParams(window.location.search);
  const campaignIndex = parseInt(params.get('id'), 10);
  const campaign = (!isNaN(campaignIndex) && CAMPAIGNS[campaignIndex])
    ? CAMPAIGNS[campaignIndex]
    : CAMPAIGNS.find(c => c.status === 'OPEN') || CAMPAIGNS[0];
  const project = PROJECTS.find(p => p.id === campaign.projectId) || PROJECTS[0];

  const gradients = [
    'linear-gradient(135deg, #667eea, #764ba2)',
    'linear-gradient(135deg, #4facfe, #00f2fe)',
    'linear-gradient(135deg, #43e97b, #38f9d7)',
    'linear-gradient(135deg, #fa709a, #fee140)',
  ];
  const idx = CAMPAIGNS.indexOf(campaign);
  document.getElementById('heroBanner').style.background = gradients[(idx >= 0 ? idx : 0) % gradients.length];

  // Status badge
  const statusLabelMap = { OPEN: 'Open', UPCOMING: 'Coming Soon', CLOSED: 'Closed' };
  const badgeColorMap = { OPEN: 'badge-info', UPCOMING: 'badge-warning', CLOSED: 'badge-neutral' };
  const statusTxt = statusLabelMap[campaign.status] || campaign.status;
  const badgeClass = badgeColorMap[campaign.status] || 'badge-neutral';
  document.getElementById('statusBadge').innerHTML = '<span class="badge ' + badgeClass + '">' + statusTxt + '</span>';

  // Populate fields
  document.getElementById('heroLocation').textContent = project.location;
  document.getElementById('campaignName').textContent = campaign.name;
  document.getElementById('projectName').textContent = project.name;
  document.getElementById('tokenSymbol').textContent = project.tokenSymbol;
  document.getElementById('tokenPrice').textContent = formatVND(project.tokenPrice);
  document.getElementById('minInvestment').textContent = formatVNDShortEN(project.minInvestment);
  document.getElementById('endDate').textContent = formatDateEN(campaign.endDate);
  document.getElementById('commitmentCount').textContent = campaign.commitmentCount + ' investors';

  // Funding progress
  const progress = campaign.targetAmount > 0
    ? Math.round((campaign.raisedAmount / campaign.targetAmount) * 100)
    : 0;
  document.getElementById('progressPercent').textContent = progress + '%';
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('raisedAmount').textContent = 'Raised: ' + formatVNDShortEN(campaign.raisedAmount);
  document.getElementById('targetAmount').textContent = 'Target: ' + formatVNDShortEN(campaign.targetAmount);

  // Campaign info
  document.getElementById('whitelistCount').textContent = campaign.whitelistCount + ' investors';
  document.getElementById('campaignDuration').textContent = formatDateEN(campaign.startDate) + ' - ' + formatDateEN(campaign.endDate);
  document.getElementById('investmentRange').textContent = formatVNDShortEN(campaign.minInvestment) + ' - ' + formatVNDShortEN(campaign.maxInvestment);

  // CTA button
  var ctaHtml = '';
  if (campaign.status === 'OPEN') {
    ctaHtml = '<a href="whitelist-join.html" class="btn-primary proto-link">Join Offering</a>';
  } else if (campaign.status === 'UPCOMING') {
    ctaHtml = '<button class="btn-primary btn-disabled">Not Yet Open</button>';
  } else {
    ctaHtml = '<button class="btn-secondary btn-disabled">Campaign Ended</button>';
  }
  document.getElementById('ctaContainer').innerHTML = ctaHtml;
</script>

</body>
</html>
