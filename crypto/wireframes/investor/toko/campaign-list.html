<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Token Offering</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">
<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="../preo/home.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Token Offering</span>
  </div>

  <!-- Filter Tabs -->
  <div class="tabs" id="filterTabs">
    <button class="tab active" onclick="setTab('OPEN')">Open</button>
    <button class="tab" onclick="setTab('UPCOMING')">Coming Soon</button>
    <button class="tab" onclick="setTab('CLOSED')">Closed</button>
  </div>

  <!-- Campaign Cards -->
  <div class="section fade-in" id="campaignList"></div>

  <div class="bottom-space"></div>
</div>

<script>
  let activeTab = 'OPEN';

  function getProjectForCampaign(campaign) {
    return PROJECTS.find(p => p.id === campaign.projectId) || {};
  }

  function renderCampaignCard(campaign, filteredIndex) {
    const project = getProjectForCampaign(campaign);
    const progress = campaign.targetAmount > 0
      ? Math.round((campaign.raisedAmount / campaign.targetAmount) * 100)
      : 0;

    // Use global CAMPAIGNS index for ?id= param
    const globalIndex = CAMPAIGNS.indexOf(campaign);

    const gradients = [
      'linear-gradient(135deg, #667eea, #764ba2)',
      'linear-gradient(135deg, #4facfe, #00f2fe)',
      'linear-gradient(135deg, #43e97b, #38f9d7)',
      'linear-gradient(135deg, #fa709a, #fee140)',
    ];

    const statusColorMap = {
      OPEN: 'badge-info',
      UPCOMING: 'badge-warning',
      CLOSED: 'badge-neutral',
    };
    const statusLabelMap = {
      OPEN: 'Open',
      UPCOMING: 'Coming Soon',
      CLOSED: 'Closed',
    };

    let actionBtn = '';
    if (campaign.status === 'OPEN') {
      actionBtn = '<span class="btn-primary" style="margin-top:16px; display:block; text-align:center">View Details</span>';
    } else if (campaign.status === 'UPCOMING') {
      actionBtn = '<span class="btn-primary btn-disabled" style="margin-top:16px; display:block; text-align:center">Not Yet Open</span>';
    } else {
      actionBtn = '<span class="btn-secondary btn-disabled" style="margin-top:16px; display:block; text-align:center">Ended</span>';
    }

    const cardLink = campaign.status !== 'CLOSED' ? 'campaign-details.html?id=' + globalIndex : '#';
    const isClickable = campaign.status !== 'CLOSED';

    return `
      <${isClickable ? 'a href="' + cardLink + '"' : 'div'} class="card fade-in${isClickable ? ' proto-link' : ''}" style="margin-bottom:16px; animation-delay:${filteredIndex * 0.05}s; text-decoration:none; display:block; color:inherit">
        <!-- Card image header -->
        <div class="proj-img" style="background:${gradients[globalIndex % gradients.length]}">
          <div class="proj-loc">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${project.location || ''}
          </div>
          <div class="proj-badge">${statusLabelMap[campaign.status] || campaign.status}</div>
        </div>
        <div class="card-body">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px">
            <div>
              <div style="font-size:15px; font-weight:700; color:var(--text)">${project.name || campaign.name}</div>
              <div style="font-size:12px; color:var(--text-2); margin-top:2px">${project.tokenSymbol || ''}</div>
            </div>
            <span class="badge ${statusColorMap[campaign.status] || 'badge-neutral'}">${statusLabelMap[campaign.status] || campaign.status}</span>
          </div>

          <!-- Progress bar -->
          <div class="proj-progress">
            <div class="proj-progress-head">
              <span class="proj-progress-label">${formatVNDShortEN(campaign.raisedAmount)} / ${formatVNDShortEN(campaign.targetAmount)}</span>
              <span class="proj-progress-pct">${progress}%</span>
            </div>
            <div class="prog-track">
              <div class="prog-fill" style="width:${progress}%"></div>
            </div>
          </div>

          <!-- Key info -->
          <div style="margin-top:16px">
            <div class="info-row">
              <span class="info-label">Token Price</span>
              <span class="info-value">${formatVND(project.tokenPrice || 0)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Min Investment</span>
              <span class="info-value">${formatVNDShortEN(project.minInvestment || 0)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">End Date</span>
              <span class="info-value">${formatDateEN(campaign.endDate)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Committed Investors</span>
              <span class="info-value green">${campaign.commitmentCount} investors</span>
            </div>
          </div>

          ${actionBtn}
        </div>
      </${isClickable ? 'a' : 'div'}>
    `;
  }

  function render() {
    const filtered = CAMPAIGNS.filter(c => c.status === activeTab);

    // Update tab active states
    const tabs = document.querySelectorAll('#filterTabs .tab');
    const tabIds = ['OPEN', 'UPCOMING', 'CLOSED'];
    tabs.forEach((tab, i) => {
      tab.classList.toggle('active', tabIds[i] === activeTab);
    });

    const container = document.getElementById('campaignList');
    if (filtered.length > 0) {
      container.innerHTML = filtered.map((c, i) => renderCampaignCard(c, i)).join('');
    } else {
      container.innerHTML = renderEmptyState('No offerings available');
    }
  }

  window.setTab = function(tabId) {
    activeTab = tabId;
    render();
  };

  render();
</script>

</body>
</html>
