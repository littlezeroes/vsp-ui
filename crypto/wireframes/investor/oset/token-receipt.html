<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Settlement Receipt</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="payment.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Settlement Receipt</span>
  </div>

  <!-- Success animation -->
  <div style="text-align:center; padding:32px var(--pad) 16px var(--pad)" class="fade-in">
    <div style="width:80px; height:80px; border-radius:50%; background:var(--green-light); display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto; position:relative">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v12"/><path d="M8 10h8"/><path d="M8 14h8"/></svg>
      <div style="position:absolute; top:-4px; right:-4px; width:28px; height:28px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <p style="font-size:20px; font-weight:700; color:var(--text)">Settlement Complete!</p>
    <p style="font-size:14px; color:var(--text-2); margin-top:6px">Your tokens have been minted to your custodial wallet</p>
  </div>

  <!-- Receipt card -->
  <div class="section fade-in" style="animation-delay:0.05s">
    <div class="section-head">
      <span class="section-title">Settlement Receipt</span>
    </div>
    <div class="card card-pad">
      <div class="card-body" id="receiptRows"></div>
    </div>
  </div>

  <!-- Blockchain TX info -->
  <div class="section fade-in" style="animation-delay:0.1s">
    <div class="card card-pad">
      <div class="card-body" style="display:flex; align-items:center; gap:12px">
        <div style="width:40px; height:40px; border-radius:var(--r12); background:linear-gradient(135deg, #EFF6FF, #DBEAFE); display:flex; align-items:center; justify-content:center; color:var(--info); flex-shrink:0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <div style="flex:1; min-width:0">
          <strong style="display:block; font-size:13px; font-weight:600; color:var(--text)">Token Minting TX</strong>
          <p style="font-size:12px; color:var(--info); font-family:monospace; margin-top:2px">0x7a3B...f29d</p>
        </div>
        <button onclick="navigator.clipboard.writeText('0x7a3Bf29d')" style="padding:8px; border:none; background:none; cursor:pointer; color:var(--text-2)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Share button -->
  <div style="padding:20px var(--pad) 0 var(--pad); animation-delay:0.15s" class="fade-in">
    <button class="btn-secondary" style="margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:8px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share Receipt
    </button>
  </div>

  <!-- Navigation buttons -->
  <div style="padding:0 var(--pad); animation-delay:0.2s" class="fade-in">
    <a href="portfolio.html" class="btn-primary proto-link" style="margin-bottom:12px">
      View Portfolio
    </a>
    <a href="../toko/campaign-list.html" class="btn-secondary proto-link">
      Back to Home
    </a>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  const alloc = ACTIVE_ALLOCATION;
  const today = new Date().toISOString().split('T')[0];

  // Render receipt rows
  var receiptHtml =
    renderInfoRow('Settlement ID', '<span style="font-family:monospace; font-size:13px">STL-2026-001234</span>') +
    renderInfoRow('Tokens Allocated', alloc.tokensAllocated + ' ' + alloc.tokenSymbol, 'green') +
    renderInfoRow('Project', alloc.projectName) +
    renderInfoRow('Token Price', formatVND(alloc.tokenPrice) + ' / token') +
    renderInfoRow('Amount Charged', formatVND(alloc.amountCharged), 'green');

  if (alloc.refundAmount > 0) {
    receiptHtml += renderInfoRow('Refund', formatVND(alloc.refundAmount) + ' <span class="badge badge-success">' + alloc.refundStatus + '</span>');
  }

  receiptHtml += renderInfoRow('Settlement Date', formatDateEN(alloc.allocatedAt || today));

  document.getElementById('receiptRows').innerHTML = receiptHtml;
</script>

</body>
</html>
