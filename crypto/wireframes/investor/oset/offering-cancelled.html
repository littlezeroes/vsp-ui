<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Offering Cancelled</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="../toko/status-tracking.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Offering Status</span>
  </div>

  <!-- Failure hero -->
  <div style="text-align:center; padding:32px var(--pad) 16px var(--pad)" class="fade-in">
    <div style="width:80px; height:80px; border-radius:50%; background:#FEF2F2; display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <p style="font-size:20px; font-weight:700; color:var(--text)">Offering Failed</p>
    <span class="badge badge-danger" style="margin-top:8px; display:inline-block">CANCELLED</span>
  </div>

  <!-- Cancellation details -->
  <div class="section fade-in" style="animation-delay:0.05s">
    <div class="section-head">
      <span class="section-title">Cancellation Details</span>
    </div>
    <div class="card card-pad">
      <div class="card-body" id="cancelDetails"></div>
    </div>
  </div>

  <!-- Subscription progress bar -->
  <div class="section fade-in" style="animation-delay:0.1s">
    <div class="section-head">
      <span class="section-title">Subscription Progress</span>
    </div>
    <div class="card card-pad">
      <div class="card-body">
        <div style="position:relative; margin-bottom:20px">
          <!-- Progress bar -->
          <div style="height:16px; background:#E5E7EB; border-radius:8px; overflow:visible; position:relative">
            <div id="subBar" style="height:100%; border-radius:8px; background:linear-gradient(90deg, #EF4444, #F87171)"></div>
            <!-- Threshold line -->
            <div id="thresholdLine" style="position:absolute; top:-6px; width:2px; height:28px; background:var(--text); z-index:2"></div>
          </div>
          <div style="display:flex; justify-content:space-between; margin-top:8px">
            <span style="font-size:11px; color:var(--text-3)">0%</span>
            <span style="font-size:11px; color:var(--danger); font-weight:600" id="actualPctLabel"></span>
            <span style="font-size:11px; color:var(--text-2); font-weight:600" id="thresholdLabel"></span>
            <span style="font-size:11px; color:var(--text-3)">100%</span>
          </div>
        </div>
        <div id="subRows"></div>
      </div>
    </div>
  </div>

  <!-- Refund confirmation -->
  <div class="section fade-in" style="animation-delay:0.15s">
    <div class="card card-pad" style="background:var(--green-light); border:1.5px solid #A7F3D0">
      <div class="card-body">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <strong style="font-size:14px; color:var(--green)">Full Refund Processed</strong>
        </div>
        <div id="refundRows"></div>
      </div>
    </div>
  </div>

  <!-- Info note -->
  <div class="section fade-in" style="animation-delay:0.2s">
    <div class="card card-pad" style="background:var(--bg)">
      <div class="card-body" style="display:flex; align-items:flex-start; gap:10px; padding:12px 16px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <p style="font-size:13px; color:var(--text-2); line-height:1.5">Your full commitment has been refunded. No tokens were minted.</p>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div style="padding:20px var(--pad) 0 var(--pad); animation-delay:0.25s" class="fade-in">
    <a href="../preo/home.html" class="btn-primary proto-link" style="margin-bottom:12px">
      View VPay Wallet
    </a>
    <a href="../toko/campaign-list.html" class="btn-secondary proto-link">
      Browse Offerings
    </a>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  var alloc = ALLOCATIONS[2]; // Cancellation scenario

  // Cancellation details
  document.getElementById('cancelDetails').innerHTML =
    renderInfoRow('Campaign', alloc.campaignName) +
    renderInfoRow('Project', alloc.projectName) +
    renderInfoRow('Reason', '<span style="color:var(--danger)">' + alloc.cancellationReason + '</span>') +
    renderInfoRow('Threshold Required', alloc.thresholdRequired + '%') +
    renderInfoRow('Actual Subscription', '<span style="color:var(--danger)">' + alloc.thresholdAchieved + '%</span>');

  // Subscription progress bar
  document.getElementById('subBar').style.width = alloc.thresholdAchieved + '%';
  document.getElementById('thresholdLine').style.left = alloc.thresholdRequired + '%';
  document.getElementById('actualPctLabel').textContent = alloc.thresholdAchieved + '% achieved';
  document.getElementById('thresholdLabel').textContent = alloc.thresholdRequired + '% required';

  document.getElementById('subRows').innerHTML =
    renderInfoRow('Your Commitment', formatVND(alloc.commitmentAmount)) +
    renderInfoRow('Subscription Rate', alloc.subscriptionRate + '%', 'danger') +
    renderInfoRow('Tokens Allocated', '0');

  // Refund confirmation
  document.getElementById('refundRows').innerHTML =
    renderInfoRow('Refund Amount', formatVND(alloc.refundAmount), 'green') +
    renderInfoRow('Refund Status', '<span class="badge badge-success">Credited to VPay Wallet</span>');
</script>

</body>
</html>
