<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Project List</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header: back + page title -->
  <div class="sub-header">
    <a href="home.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Project List</span>
  </div>

  <!-- Search Bar -->
  <div class="fade-in" style="padding:0 var(--pad); margin-top:8px">
    <div style="position:relative">
      <div style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-3)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input type="text" class="input" style="padding-left:42px; padding-right:42px" placeholder="Search projects...">
      <button style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-3); background:none; border:none; cursor:pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
    </div>
  </div>

  <!-- Filter Chips -->
  <div class="fade-in" style="display:flex; gap:8px; padding:12px var(--pad) 0; overflow-x:auto; animation-delay:0.05s">
    <button style="padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; border:none; cursor:pointer; white-space:nowrap; background:var(--green); color:white">All</button>
    <button style="padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1.5px solid #E5E7EB; cursor:pointer; white-space:nowrap; background:var(--white); color:var(--text-2)">Open</button>
    <button style="padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1.5px solid #E5E7EB; cursor:pointer; white-space:nowrap; background:var(--white); color:var(--text-2)">Coming Soon</button>
    <button style="padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1.5px solid #E5E7EB; cursor:pointer; white-space:nowrap; background:var(--white); color:var(--text-2)">Funded</button>
  </div>

  <!-- Sort Row -->
  <div class="fade-in" style="display:flex; align-items:center; justify-content:space-between; padding:12px var(--pad) 0; animation-delay:0.1s">
    <span style="font-size:13px; color:var(--text-2)" id="resultCount"></span>
    <div style="display:flex; align-items:center; gap:4px; font-size:13px; color:var(--text-2)">
      <span>Sort by:</span>
      <select style="font-size:13px; font-weight:600; color:var(--green); background:transparent; border:none; cursor:pointer; outline:none">
        <option>Yield</option>
        <option>Token Price</option>
        <option>Newest</option>
      </select>
    </div>
  </div>

  <!-- Project Cards -->
  <div class="section fade-in" style="margin-top:12px; animation-delay:0.15s" id="projectList"></div>

  <div class="bottom-space"></div>

</div>

<script>
  // Result count
  document.getElementById('resultCount').textContent = PROJECTS.length + ' projects';

  // Render all project cards using shared component
  document.getElementById('projectList').innerHTML = PROJECTS.map((p, i) =>
    renderProjectCard(p, i, 'project-details.html?id=' + i)
  ).join('');
</script>

</body>
</html>
