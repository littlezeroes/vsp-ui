<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Property Details</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header: back + page title -->
  <div class="sub-header">
    <a href="project-details.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Property Details</span>
  </div>

  <!-- Image Gallery Placeholder (horizontal scroll with counter + dots) -->
  <div class="fade-in" style="position:relative; padding:8px var(--pad) 0">
    <!-- Counter badge -->
    <div style="position:absolute; top:16px; right:calc(var(--pad) + 8px); z-index:5; background:rgba(0,0,0,0.55); color:white; font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px">1/5</div>
    <!-- Scrollable images -->
    <div style="display:flex; gap:10px; overflow-x:auto">
      <div style="width:220px; height:140px; background:linear-gradient(135deg, #E8F8F5, #D1F2EB); border-radius:var(--r16); display:flex; align-items:center; justify-content:center; flex-shrink:0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div style="width:220px; height:140px; background:linear-gradient(135deg, #F0F4FF, #E0E7FF); border-radius:var(--r16); display:flex; align-items:center; justify-content:center; flex-shrink:0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div style="width:220px; height:140px; background:linear-gradient(135deg, #FFF5F5, #FEE2E2); border-radius:var(--r16); display:flex; align-items:center; justify-content:center; flex-shrink:0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f5576c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div style="width:220px; height:140px; background:linear-gradient(135deg, #FEF3C7, #FDE68A); border-radius:var(--r16); display:flex; align-items:center; justify-content:center; flex-shrink:0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div style="width:220px; height:140px; background:linear-gradient(135deg, #EDE9FE, #DDD6FE); border-radius:var(--r16); display:flex; align-items:center; justify-content:center; flex-shrink:0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
    </div>
    <!-- Dot indicators -->
    <div style="display:flex; justify-content:center; gap:6px; margin-top:10px">
      <div style="width:8px; height:8px; border-radius:50%; background:var(--green)"></div>
      <div style="width:8px; height:8px; border-radius:50%; background:#D1D5DB"></div>
      <div style="width:8px; height:8px; border-radius:50%; background:#D1D5DB"></div>
      <div style="width:8px; height:8px; border-radius:50%; background:#D1D5DB"></div>
      <div style="width:8px; height:8px; border-radius:50%; background:#D1D5DB"></div>
    </div>
  </div>

  <!-- Property Info Card -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.05s">
    <div class="card-body">
      <div style="font-size:16px; font-weight:700; color:var(--text); line-height:1.35; margin-bottom:16px" id="propAddress"></div>
      <div id="propInfoRows"></div>
    </div>
  </div>

  <!-- NAV Value Card (green gradient, matching wallet style) -->
  <div class="wallet fade-in" style="margin-top:16px; animation-delay:0.1s">
    <div class="wallet-glow wallet-glow-1"></div>
    <div class="wallet-glow wallet-glow-2"></div>
    <div class="wallet-label">Net Asset Value (NAV)</div>
    <div class="wallet-amount" id="propNAV"></div>
    <div style="font-size:13px; color:rgba(255,255,255,0.75); margin-top:8px; position:relative; z-index:1" id="tokenEquiv"></div>
  </div>

  <!-- Features List -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.15s">
    <div class="card-body">
      <div style="font-size:14px; font-weight:600; color:var(--text); margin-bottom:14px">Key Amenities</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
        <div style="display:flex; align-items:center; gap:8px">
          <div style="width:28px; height:28px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span style="font-size:14px; color:var(--text)">Balcony</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px">
          <div style="width:28px; height:28px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span style="font-size:14px; color:var(--text)">City View</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px">
          <div style="width:28px; height:28px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span style="font-size:14px; color:var(--text)">Fully Furnished</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px">
          <div style="width:28px; height:28px; background:var(--green-light); border-radius:50%; display:flex; align-items:center; justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span style="font-size:14px; color:var(--text)">Parking</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Map Placeholder -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.2s">
    <div class="card-body">
      <div style="font-size:14px; font-weight:600; color:var(--text); margin-bottom:12px">Location</div>
      <div style="height:140px; background:var(--bg); border-radius:var(--r12); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span style="font-size:12px; color:var(--text-3)">Map</span>
      </div>
    </div>
  </div>

  <!-- View Project Button -->
  <div class="fade-in" style="padding:24px var(--pad) 0; animation-delay:0.25s">
    <a href="project-details.html" class="btn-primary proto-link">
      View Project
    </a>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  const prop = PROPERTIES[0];
  const project = PROJECTS.find(p => p.id === prop.projectId) || PROJECTS[0];

  document.getElementById('propAddress').textContent = prop.address;

  // Build info rows using shared component
  const floorText = prop.floor > 0 ? 'Floor ' + prop.floor : 'Ground Floor';
  const tokenText = prop.tokenized ? 'Tokenized' : 'Not Tokenized';
  const tokenClass = prop.tokenized ? 'green' : '';

  document.getElementById('propInfoRows').innerHTML =
    renderInfoRow('Type', prop.type) +
    renderInfoRow('Area', prop.area + ' m\u00B2') +
    renderInfoRow('Bedrooms', prop.bedrooms + ' rooms') +
    renderInfoRow('Bathrooms', prop.bathrooms + ' rooms') +
    renderInfoRow('Floor', floorText) +
    renderInfoRow('Tokenization', tokenText, tokenClass);

  document.getElementById('propNAV').textContent = formatVND(prop.nav);

  const tokenEquiv = Math.round(prop.nav / project.tokenPrice);
  document.getElementById('tokenEquiv').textContent = 'Equivalent: ' + tokenEquiv.toLocaleString('vi-VN') + ' tokens (' + project.tokenSymbol + ')';
</script>

</body>
</html>
