<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Project Details</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header: back + page title -->
  <div class="sub-header">
    <a href="project-list.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Project Details</span>
  </div>

  <!-- Hero Banner (gradient image placeholder) -->
  <div class="fade-in" style="height:160px; background:linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:flex-end; padding:16px var(--pad); position:relative">
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,0.9); font-weight:500">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="heroLocation"></span>
    </div>
    <div id="statusBadge" style="position:absolute; top:12px; right:var(--pad)"></div>
  </div>

  <!-- Project Info Card (overlapping hero) -->
  <div class="card card-pad fade-in" style="margin-top:-24px; position:relative; z-index:10; animation-delay:0.05s">
    <div class="card-body">
      <div style="font-size:17px; font-weight:700; color:var(--text); line-height:1.35" id="projectName"></div>
      <div style="display:flex; align-items:center; gap:6px; margin-top:8px; font-size:13px; color:var(--text-2)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>
        <span id="projectDeveloper"></span>
      </div>
    </div>
  </div>

  <!-- Key Metrics (2x2 grid) -->
  <div class="fade-in" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px var(--pad) 0; animation-delay:0.1s">
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Token Price</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="tokenPrice"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Expected Yield</div>
        <div style="font-size:15px; font-weight:700; color:var(--green)" id="expectedYield"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Total Tokens</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="totalTokens"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:14px 16px">
        <div style="font-size:12px; color:var(--text-2); margin-bottom:4px">Sold</div>
        <div style="font-size:15px; font-weight:700; color:var(--text)" id="soldTokens"></div>
      </div>
    </div>
  </div>

  <!-- Token Sale Progress -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.15s">
    <div class="card-body">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <span style="font-size:14px; font-weight:600; color:var(--text)">Token Sale Progress</span>
        <span style="font-size:14px; font-weight:700; color:var(--green)" id="progressPercent"></span>
      </div>
      <div class="prog-track" style="height:8px">
        <div class="prog-fill" id="progressBar" style="height:100%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:var(--text-2)">
        <span id="soldAmount"></span>
        <span id="totalAmount"></span>
      </div>
    </div>
  </div>

  <!-- Description -->
  <div class="card card-pad fade-in" style="margin-top:16px; animation-delay:0.2s">
    <div class="card-body">
      <div style="font-size:14px; font-weight:600; color:var(--text); margin-bottom:8px">Project Description</div>
      <p style="font-size:14px; color:var(--text-2); line-height:1.6" id="projectDesc"></p>
    </div>
  </div>

  <!-- Properties in Project (preview: top 3 + View All link) -->
  <div class="section fade-in" style="animation-delay:0.25s">
    <div class="section-head">
      <span class="section-title">Properties <span id="propCount" style="font-size:12px; font-weight:600; color:white; background:var(--green); padding:2px 8px; border-radius:10px; margin-left:6px"></span></span>
    </div>
    <div id="propertyList"></div>
    <div id="viewAllWrap" style="padding:8px var(--pad) 0"></div>
  </div>

  <!-- Action Buttons -->
  <div class="fade-in" style="padding:24px var(--pad) 0; animation-delay:0.3s">
    <a href="calculator.html" class="btn-secondary proto-link" style="margin-bottom:12px">
      Investment Calculator
    </a>
    <a href="../toko/campaign-list.html" class="btn-primary proto-link">
      Invest Now
    </a>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  const project = PROJECTS[0];
  const progress = project.totalTokens > 0 ? Math.round((project.soldTokens / project.totalTokens) * 100) : 0;

  document.getElementById('projectName').textContent = project.name;
  document.getElementById('projectDeveloper').textContent = project.developer;
  document.getElementById('heroLocation').textContent = project.location;
  document.getElementById('tokenPrice').textContent = formatVND(project.tokenPrice);
  document.getElementById('expectedYield').textContent = formatPercent(project.expectedYield) + '/year';
  document.getElementById('totalTokens').textContent = project.totalTokens.toLocaleString('vi-VN');
  document.getElementById('soldTokens').textContent = project.soldTokens.toLocaleString('vi-VN');
  document.getElementById('progressPercent').textContent = progress + '%';
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('soldAmount').textContent = 'Sold: ' + formatVNDShort(project.soldTokens * project.tokenPrice);
  document.getElementById('totalAmount').textContent = 'Target: ' + formatVNDShort(project.totalTokens * project.tokenPrice);
  document.getElementById('projectDesc').textContent = project.description;

  // Status badge
  const statusMap = { ACTIVE: 'Open', FUNDED: 'Funded', UPCOMING: 'Coming Soon', CLOSED: 'Closed' };
  const statusTxt = statusMap[project.status] || project.status;
  const badgeColorMap = { ACTIVE: 'badge-success', FUNDED: 'badge-info', UPCOMING: 'badge-warning', CLOSED: 'badge-neutral' };
  const badgeClass = badgeColorMap[project.status] || 'badge-neutral';
  document.getElementById('statusBadge').innerHTML = '<span class="badge ' + badgeClass + '">' + statusTxt + '</span>';

  // Render properties for this project (preview: top 3)
  const props = PROPERTIES.filter(p => p.projectId === project.id);
  const previewProps = props.slice(0, 3);

  document.getElementById('propCount').textContent = props.length;

  document.getElementById('propertyList').innerHTML = previewProps.map(prop =>
    renderListItem({
      iconBg: 'linear-gradient(135deg, #E8F8F5, #D1F2EB)',
      iconColor: 'var(--green)',
      iconSvg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>',
      title: prop.address,
      subtitle: prop.type + ' | ' + prop.area + ' m\u00B2 | ' + prop.bedrooms + ' BR',
      rightHtml: '<div class="list-right"><strong style="color:var(--green)">' + formatVNDShort(prop.nav) + '</strong><p>NAV</p></div>',
      href: 'property-details.html?id=' + prop.id,
    })
  ).join('');

  // View All link (only if more than 3 properties)
  if (props.length > 3) {
    document.getElementById('viewAllWrap').innerHTML =
      '<a href="property-list.html?projectId=' + project.id + '" class="btn-secondary proto-link" style="font-size:14px; text-align:center">' +
      'View All ' + props.length + ' Properties \u2192</a>';
  }
</script>

</body>
</html>
