<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLARIS - Notifications</title>
  <script src="https://cdn.tailwindcss.com/4"></script>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../data.js"></script>
  <script src="../../components.js"></script>
</head>
<body class="phone-screen">

<div class="phone">

  <!-- Sub-page header -->
  <div class="sub-header">
    <a href="../oset/portfolio.html" class="btn-circle proto-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="sub-header-title">Notifications</span>
  </div>

  <!-- Unread count + Mark all read -->
  <div class="fade-in" style="padding:0 var(--pad); display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
    <span id="unreadCount" style="font-size:13px; font-weight:600; color:var(--text-2)"></span>
    <button style="font-size:13px; font-weight:600; color:var(--green); background:none; border:none; cursor:pointer; font-family:inherit" onclick="markAllRead()">Mark All Read</button>
  </div>

  <!-- Filter tabs -->
  <div class="tabs fade-in" style="animation-delay:0.05s">
    <button class="tab active" onclick="filterNotifs('ALL', this)">All</button>
    <button class="tab" onclick="filterNotifs('UNREAD', this)">Unread</button>
    <button class="tab" onclick="filterNotifs('PRICE_ALERT', this)">Price</button>
    <button class="tab" onclick="filterNotifs('PROJECT_UPDATE', this)">Project</button>
    <button class="tab" onclick="filterNotifs('SYSTEM', this)">System</button>
  </div>

  <!-- Notification list -->
  <div id="notifList" class="section fade-in" style="animation-delay:0.1s; margin-top:16px"></div>

  <!-- Price alert settings link -->
  <div style="padding:16px var(--pad); padding-bottom:8px" class="fade-in" style="animation-delay:0.15s">
    <a href="reports.html" class="btn-outline proto-link" style="display:block; text-align:center; width:100%">
      <span style="display:flex; align-items:center; justify-content:center; gap:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Price Alert Settings
      </span>
    </a>
  </div>

  <div class="bottom-space"></div>

</div>

<script>
  const iconColorMap = {
    chart:    { bg: 'linear-gradient(135deg, #EFF6FF, #DBEAFE)', color: 'var(--info)' },
    building: { bg: 'linear-gradient(135deg, #ECFDF5, #D1FAE5)', color: 'var(--green)' },
    alert:    { bg: 'linear-gradient(135deg, #F3F4F6, #E5E7EB)', color: 'var(--text-2)' },
    token:    { bg: 'linear-gradient(135deg, #FFFBEB, #FEF3C7)', color: 'var(--warning)' },
  };

  const iconSvgMap = {
    chart:    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    building: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>',
    alert:    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    token:    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v12"/><path d="M8 10h8"/><path d="M8 14h8"/></svg>',
  };

  function getRelativeTime(timestamp) {
    const now = new Date();
    const then = new Date(timestamp);
    const diffMs = now - then;
    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
    const diffDays = Math.floor(diffHours / 24);
    if (diffDays > 0) return diffDays + ' days ago';
    if (diffHours > 0) return diffHours + ' hours ago';
    return 'Just now';
  }

  // Track read state locally
  let notifData = NOTIFICATIONS.map(n => ({ ...n }));

  function updateUnreadCount() {
    const unread = notifData.filter(n => !n.read).length;
    document.getElementById('unreadCount').textContent = unread + ' unread';
  }

  function renderNotifList(notifs) {
    if (notifs.length === 0) {
      return '<div style="text-align:center; padding:40px 0; color:var(--text-2); font-size:14px">No notifications</div>';
    }
    return notifs.map(notif => {
      const colors = iconColorMap[notif.icon] || iconColorMap.alert;
      const svg = iconSvgMap[notif.icon] || iconSvgMap.alert;
      const unreadDot = !notif.read ? '<div style="width:8px; height:8px; border-radius:50%; background:var(--info); flex-shrink:0"></div>' : '';
      const titleWeight = !notif.read ? '700' : '600';
      const titleColor = !notif.read ? 'var(--text)' : 'var(--text-2)';

      return `
        <div style="display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid #F0F0F0">
          <div style="width:42px; height:42px; border-radius:var(--r12); background:${colors.bg}; display:flex; align-items:center; justify-content:center; color:${colors.color}; flex-shrink:0">
            ${svg}
          </div>
          <div style="flex:1; min-width:0">
            <div style="display:flex; align-items:center; gap:8px">
              <strong style="font-size:14px; font-weight:${titleWeight}; color:${titleColor}; flex:1">${notif.title}</strong>
              ${unreadDot}
            </div>
            <p style="font-size:12px; color:var(--text-2); margin-top:4px; line-height:1.5">${notif.description}</p>
            <span style="font-size:11px; color:var(--text-3); margin-top:4px; display:block">${getRelativeTime(notif.timestamp)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterNotifs(filter, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    let filtered;
    if (filter === 'ALL') filtered = notifData;
    else if (filter === 'UNREAD') filtered = notifData.filter(n => !n.read);
    else filtered = notifData.filter(n => n.type === filter);

    document.getElementById('notifList').innerHTML = renderNotifList(filtered);
  }

  function markAllRead() {
    notifData.forEach(n => n.read = true);
    updateUnreadCount();
    // Re-render current view
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) activeTab.click();
  }

  // Initial render
  updateUnreadCount();
  document.getElementById('notifList').innerHTML = renderNotifList(notifData);
</script>

</body>
</html>
